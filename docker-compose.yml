services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nosdeux
      POSTGRES_USER: nosdeux
      POSTGRES_PASSWORD: nosdeux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nosdeux"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: ../Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      DB_DSN: postgres://nosdeux:nosdeux@postgres:5432/nosdeux
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      USERS: ${USERS}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  pgdata:
