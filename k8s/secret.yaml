# Create this secret manually on the cluster — do NOT commit real values.
# Usage: kubectl apply -f k8s/secret.yaml
#
# When adding the real Supabase backend, fill in the base64-encoded values:
#   echo -n 'https://your-project.supabase.co' | base64
#   echo -n 'your-anon-key' | base64
apiVersion: v1
kind: Secret
metadata:
  name: nosdeux-secrets
  namespace: default
type: Opaque
data:
  supabase-url: ""        # base64(VITE_SUPABASE_URL)
  supabase-anon-key: ""   # base64(VITE_SUPABASE_ANON_KEY)
